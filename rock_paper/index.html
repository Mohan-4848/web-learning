<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div id="main">
        <img src="r.png" alt="Rock" id="r">
        <img src="p.png" alt="Paper" id="p">
        <img src="s.jpeg" alt="Scissors" id="s">
    </div>
    <div id="score-board">
        <p id="status">Click image to play</p>
        <p>Player Score: <span id="up">0</span></p>
        <p>Computer Score: <span id="cp">0</span></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
